syntax = "proto3";

package grpc; //package与java_package有些不同，java_package是定义编译生成的java文件所在的目录，而package是对应的java类的命名空间
option java_package = "com.rivers.proto";
option java_outer_classname = "BatchServiceProto"; //要生成Java类的名称
option java_multiple_files = true;

message LoginUser {
    string username = 1;
    string userId = 2;
}

message SaveTaskInfoReq {
    string taskName = 1;
    string jobName = 2;
    string cron = 3;
    string serviceName = 4;
    string email = 5;
    LoginUser loginUser = 6;
}

message UpdateTaskInfoReq {
    int64 id = 1;
    string taskName = 2;
    string jobName = 3;
    string cron = 4;
    string serviceName = 5;
    string email = 6;
    LoginUser loginUser = 7;
}

message CommonTaskReq {
    int64 id = 1;
    LoginUser loginUser = 2;
}

message JobExecutionCountRes {
    string status = 1;
    int64 count = 2;
    string rate = 3;
    string monthDay = 4;
}

message JobExecutionRes {
    repeated JobExecutionCountRes jobExecutionCounts = 1;
    int64 totalCount = 2;
}

message SchedulerStatusRes {
    string status = 1;
    string schedulerName = 2;
    string maxMemory = 3;
    string totalMemory = 4;
    string freeMemory = 5;
    string usedMemory = 6;
    string cpuCores = 7;
    string cpuUsage = 8;
    string jobCount = 9;
    string successFullyCount = 10;
}

message SchedulesRes {
    repeated SchedulerStatusRes schedules = 1;
}

message JobDateExecutionReq {
    string time = 1;
    LoginUser loginUser = 2;
}

message JobDateExecutionRes {
    string successCount = 1;
    string failureCount = 2;
    string monthDay = 3;
    string successPercent = 4;
    string failurePercent = 5;
}

message JobDateExecutionsRes {
    repeated JobDateExecutionRes jobDateExecutions = 1;
}

message JobLunchReq {
    int64 currentPage = 1;
    int64 pageSize = 2;
    LoginUser loginUser = 3;
}

message JobLunch {
    string jobName = 1;
    string jobGroup = 2;
    string state = 3;
}

message JobLunchRes {
    int64 total = 1;
    repeated JobLunch jobLunches = 2;
}

message JobDetailRes {
    int64 id = 1;
    string taskName = 2;
    string jobName = 3;
    string cron = 4;
    string serverName = 5;
    string email = 6;
    string status = 7;
}

message JobPageReq {
    int64 currentPage = 1;
    int64 pageSize = 2;
    string jobName = 3;
    LoginUser loginUser = 4;
}

message JobPageRes {
    int64 total = 1;
    repeated JobDetailRes jobs = 2;
}