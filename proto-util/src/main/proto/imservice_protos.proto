syntax = "proto3";

package grpc; //package与java_package有些不同，java_package是定义编译生成的java文件所在的目录，而package是对应的java类的命名空间
option java_package = "com.rivers.proto";
option java_outer_classname = "BatchServiceProto"; //要生成Java类的名称
option java_multiple_files = true;

message LoginUser {
    string username = 1;
    string userId = 2;
}

message SaveMsgReq {
    int64 fromUserId = 1;
    int64 toUserId = 2;
    int64 groupId = 3;
    int32 messageType = 4;
    string content = 5;
    string fileUrl = 6;
    LoginUser loginUser = 7;
}

message SaveFriendReq {
    string friendId = 1;
    string remark = 2;
    LoginUser loginUser = 3;
}

message DeleteFriendReq {
    string friendId = 1;
    LoginUser loginUser = 2;
}

message FriendDetailRes {
    int64 id = 1;
    string friendId = 2;
    string remark = 3;
    string friendName = 4;
    string friendAvatar = 5;
}

message FriendDetailReq {
    string friendId = 1;
    LoginUser loginUser = 2;
}

message FriendPageReq {
    int32 currentPage = 1;
    int32 pageSize = 2;
    string friendName = 3;
    string friendId = 4;
    LoginUser loginUser = 5;
}

message FriendPageRes {
    int32 total = 1;
    repeated FriendDetailRes friendList = 2;
}

message CreateTicketReq {
    LoginUser loginUser = 1;
}

message CreateTicketRes {
    string ticket = 1;
}

message FriendRequestRes {
    string friendId = 1;
    string friendName = 2;
    string friendAvatar = 3;
    string remark = 4;
    string status = 5;
    string updateTime = 6;
    string direction = 7;
}

message FriendRequestPageReq {
    int32 pageSize = 1;
    int64 lastId = 2;
    string lastCreateTime = 3;
    string friendName = 4;
    LoginUser loginUser = 5;
}

message FriendRequestPageRes {
    string hasMore = 1;
    repeated FriendRequestRes friendRequests = 2;
}

message FriendListReq {
    LoginUser loginUser = 1;
}

message FriendListRes {
    repeated FriendDetailRes friendList = 1;
}